name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  site:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Astro and TypeScript
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Validate generated output
        run: npm run validate

      - name: Check patch whitespace
        run: git diff --check
